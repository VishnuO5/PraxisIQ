name: PraxisIQ CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest

    - name: Build database
      run: python create_database.py

    - name: Run Trust & Safety pipeline
      run: python trust_safety/trust_safety_pipeline.py

    - name: Run analytics scripts
      run: |
        python analytics/statistical_analysis.py
        python analytics/treatment_risk_analysis.py
        python analytics/duplicate_review_detection.py
        python analytics/service_quality_analysis.py

    - name: Run ML classifier
      run: python ml/review_classifier_v2.py

    - name: Run unit tests
      run: python -m pytest tests/ -v --tb=short

    - name: Verify expected report outputs exist
      run: |
        python - << 'PYEOF'
        import os
        expected = [
            "reports/trust_safety_metrics.csv",
            "reports/moderation_queue.csv",
            "reports/statistical_analysis.csv",
            "reports/duplicate_review_detection.csv",
            "reports/service_quality_analysis.csv",
            "reports/treatment_risk_analysis.csv",
        ]
        missing = [f for f in expected if not os.path.exists(f)]
        if missing:
            print(f"MISSING OUTPUTS: {missing}")
            exit(1)
        print(f"All {len(expected)} expected outputs verified.")
        PYEOF
